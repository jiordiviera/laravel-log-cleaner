name: Laravel Log Cleaner Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
        laravel: ["9.*", "10.*", "11.*", "12.*"]
        exclude:
          # Laravel 11 requires PHP 8.2+
          - php: "8.1"
            laravel: "11.*"
          # Laravel 12 requires PHP 8.2+
          - php: "8.1"
            laravel: "12.*"

    name: P${{ matrix.php }} - L${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          # Ignore security advisories for Laravel 9 (EOL, safe in CI tests only)
          if [[ "${{ matrix.laravel }}" == "9.*" ]]; then
            composer config audit.block-insecure false --no-plugins
          fi
          composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Create Laravel Project
        run: |
          composer create-project --prefer-dist laravel/laravel:${{ matrix.laravel }} test-app
          cd test-app
          composer require jiordiviera/laravel-log-cleaner

      - name: Generate Log Files
        run: |
          cd test-app
          php artisan tinker --execute="Log::info('Test log entry');"
          php artisan tinker --execute="Log::error('Test error entry');"

      - name: Run Log Cleaner
        run: |
          cd test-app
          php artisan log:clear

      - name: Check Log Files
        run: |
          cd test-app/storage/logs
          if [ -s laravel.log ]; then
            echo "Log file is not empty"
            exit 1
          else
            echo "Log file is empty or does not exist"
          fi

      - name: Run Package Tests
        run: vendor/bin/pest

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Run Laravel Pint
        run: composer lint

      - name: Run PHPStan
        run: composer analyse
